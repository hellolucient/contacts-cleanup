<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contacts Review</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div>
            <p class="eyebrow">Outlook CSV</p>
            <h1>Contacts Review</h1>
          </div>
          <button id="exportBtn" class="icon-button" title="Export reviewed CSV files">Export</button>
        </div>

        <div class="progress">
          <div class="progress-row">
            <span id="positionLabel">0 of 0</span>
            <span id="reviewedLabel">0 reviewed</span>
          </div>
          <div class="progress-track"><div id="progressBar"></div></div>
        </div>

        <form id="searchForm" class="search-form">
          <input id="searchInput" type="search" placeholder="Search names, email, phone, company" />
          <select id="statusFilter" aria-label="Status filter">
            <option value="">All</option>
            <option value="unreviewed">Unreviewed</option>
            <option value="keep">Keep</option>
            <option value="delete">Delete</option>
            <option value="maybe">Maybe</option>
            <option value="merged">Merged</option>
          </select>
        </form>

        <div id="searchResults" class="search-results"></div>

        <div class="stats-grid">
          <div><strong id="statUnreviewed">0</strong><span>Unreviewed</span></div>
          <div><strong id="statKeep">0</strong><span>Keep</span></div>
          <div><strong id="statDelete">0</strong><span>Delete</span></div>
          <div><strong id="statMaybe">0</strong><span>Maybe</span></div>
        </div>
      </aside>

      <section class="review-area">
        <nav class="topbar">
          <div class="review-actions">
            <button id="prevBtn" class="nav-button" title="Previous contact">‹</button>
            <input id="jumpInput" type="number" min="1" value="1" aria-label="Jump to contact number" />
            <button id="nextBtn" class="nav-button" title="Next contact">›</button>
            <button id="resumeBtn" class="status-btn">Resume</button>
            <button class="status-btn keep" data-status="keep">Keep</button>
            <button class="status-btn maybe" data-status="maybe">Maybe</button>
            <button class="status-btn delete" data-status="delete">Delete</button>
            <button class="status-btn merged" data-status="merged">Merged</button>
          </div>
        </nav>

        <div id="exportMessage" class="export-message" hidden></div>

        <div class="content-grid">
          <article class="contact-card">
            <div class="card-header">
              <div>
                <p id="rowMeta" class="eyebrow">Row</p>
                <h2 id="displayName">Loading...</h2>
                <p id="companyLine" class="subtle"></p>
              </div>
              <div class="record-actions">
                <span id="statusPill" class="status-pill">unreviewed</span>
                <button id="currentUndoBtn" class="record-action undo">Undo</button>
              </div>
            </div>

            <div id="primaryFields" class="primary-fields"></div>

            <label class="note-box">
              <span>Review note</span>
              <textarea id="reviewNote" rows="3" placeholder="Optional note for this contact"></textarea>
            </label>

            <details class="edit-panel">
              <summary>Edit fields for export</summary>
              <div id="editFields" class="edit-fields"></div>
              <div class="edit-actions">
                <button id="saveEditsBtn" class="record-action">Save edits</button>
                <span id="saveEditsStatus" class="small-meta"></span>
              </div>
            </details>
          </article>

          <aside class="duplicates-panel">
            <div class="panel-header">
              <h3>Possible Duplicates</h3>
              <span id="duplicateCount">0</span>
            </div>
            <div id="duplicates"></div>
          </aside>
        </div>
      </section>
    </main>

    <dialog id="mergeDialog" class="merge-dialog">
      <form method="dialog" id="mergeForm">
        <div class="merge-header">
          <div>
            <p class="eyebrow">Merge Review</p>
            <h2 id="mergeTitle">Merge contacts</h2>
          </div>
          <button class="nav-button" value="cancel" title="Close merge review">×</button>
        </div>
        <div id="mergeFields" class="merge-fields"></div>
        <div class="merge-footer">
          <button class="status-btn" value="cancel">Cancel</button>
          <button id="confirmMergeBtn" class="status-btn merged" value="default">Save final and mark duplicate merged</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js"></script>
  </body>
</html>
